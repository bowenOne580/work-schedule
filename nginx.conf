# Work Schedule - Nginx reverse proxy config
# 使用方式：
#   1. 将本文件软链接或复制到 /etc/nginx/sites-available/work-schedule
#   2. 执行 ln -s /etc/nginx/sites-available/work-schedule /etc/nginx/sites-enabled/
#   3. 执行 nginx -t 检查配置
#   4. 执行 systemctl reload nginx 生效
#
# 前提：已执行 ./start.sh 启动了前端(5173)和后端(8998)服务

server {
    listen 80;
    server_name todo.wbwone1.cn;

    # 后端 API 代理
    location /api/ {
        proxy_pass http://localhost:8998;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 前端 Vite 开发服务器代理
    location / {
        proxy_pass http://localhost:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
